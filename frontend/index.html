<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Sans+KR:wght@400;500;700&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Intelligence infrastructure for global professionals." />
    <meta property="og:title" content="Executive Brain" />
    <title>Executive Brain</title>
    <script>
      (() => {
        try {
          const storedLang = window.localStorage.getItem('eb_lang');
          const resolvedLang =
            storedLang === 'ar' || storedLang === 'fr' ? storedLang : 'en';
          const resolvedDir = resolvedLang === 'ar' ? 'rtl' : 'ltr';

          document.documentElement.lang = resolvedLang;
          document.documentElement.dir = resolvedDir;
        } catch {
          document.documentElement.lang = 'en';
          document.documentElement.dir = 'ltr';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
